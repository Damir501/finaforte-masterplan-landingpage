<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>architect-copy tests</title></head>
<body>
<h1>architect-copy.js tests</h1>
<pre id="out"></pre>
<script src="/shared/architect-copy.js"></script>
<script>
(function() {
  var results = [];
  function check(name, cond) {
    results.push((cond ? 'PASS' : 'FAIL') + ' — ' + name);
    if (!cond) console.error('FAIL: ' + name);
  }
  check('window.ARCHITECT exists', typeof window.ARCHITECT === 'object');
  check('hero.h1 non-empty', !!ARCHITECT.hero.h1);
  check('hero.cta_primary non-empty', !!ARCHITECT.hero.cta_primary);
  check('scan.progress(3,11) returns string', ARCHITECT.scan.progress(3,11) === 'Vraag 3 van 11');
  check('rapport.opener non-empty', !!ARCHITECT.rapport.opener);
  var domeinIds = ['pensioengat','estate','schenken_erven','box3_2028',
    'salaris_dividend','eigen_woning','box3_optimizer','lenen_bv',
    'pensioen_toeslagen','peildatum','vastgoed','peb_odv_lijfrente','aflossen_beleggen'];
  check('13 domeinen aanwezig', Object.keys(ARCHITECT.domeinen).length === 13);
  domeinIds.forEach(function(id) {
    check('domein ' + id + ' bestaat', !!ARCHITECT.domeinen[id]);
    if (ARCHITECT.domeinen[id]) {
      check('domein ' + id + ' heeft title', !!ARCHITECT.domeinen[id].title);
      check('domein ' + id + ' heeft calculator_path', !!ARCHITECT.domeinen[id].calculator_path);
    }
  });
  document.getElementById('out').textContent = results.join('\n');
})();
</script>
</body></html>
