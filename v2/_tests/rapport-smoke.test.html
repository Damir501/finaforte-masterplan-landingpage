<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>rapport smoke</title>
<style>iframe{width:100%;height:600px;border:1px solid #ccc;margin-bottom:24px;}</style>
</head>
<body>
<h1>Rapport smoke — 3 combinaties</h1>
<pre id="hashes"></pre>
<h2>Combo 1: DGA-overdracht</h2>
<iframe id="f1"></iframe>
<h2>Combo 2: Particulier-rich</h2>
<iframe id="f2"></iframe>
<h2>Combo 3: ZZP-pensioenrisico</h2>
<iframe id="f3"></iframe>
<script src="/shared/scan-fingerprint.js"></script>
<script>
(function() {
  var combos = [
    ['estate', 'schenken_erven', 'salaris_dividend'],
    ['box3_2028', 'estate', 'box3_optimizer'],
    ['pensioengat', 'peb_odv_lijfrente', 'aflossen_beleggen']
  ];
  var lines = [];
  combos.forEach(function(c, i) {
    var h = ScanFingerprint.encode(c);
    lines.push('Combo ' + (i+1) + ': ' + h + '  → ' + c.join(', '));
    document.getElementById('f' + (i+1)).src = '/v2/rapport/?p=' + h;
  });
  document.getElementById('hashes').textContent = lines.join('\n');
})();
</script></body></html>
