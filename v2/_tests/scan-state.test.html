<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>scan-state tests</title></head>
<body><pre id="out"></pre>
<script src="/v2/scan/scan-state.js"></script>
<script>
(function() {
  var R = [];
  function check(n, c) { R.push((c?'PASS':'FAIL') + ' — ' + n); if(!c) console.error('FAIL: '+n); }

  ScanState.clear();
  var s0 = ScanState.load();
  check('Lege state.answers = {}', JSON.stringify(s0.answers) === '{}');
  check('Lege state.currentIdx = 0', s0.currentIdx === 0);
  check('Lege state.profile = null', s0.profile === null);

  ScanState.setAnswer(s0, 'q1', 'dga');
  check('Q1=dga zet profile', s0.profile === 'dga');
  check('answers.q1 = dga', s0.answers.q1 === 'dga');

  ScanState.setAnswer(s0, 'q2', 'holding_werk');
  var s1 = ScanState.load();
  check('Persistence na save: q1 = dga', s1.answers.q1 === 'dga');
  check('Persistence na save: q2 = holding_werk', s1.answers.q2 === 'holding_werk');

  ScanState.clear();
  var s2 = ScanState.load();
  check('Clear leegt state', JSON.stringify(s2.answers) === '{}');

  document.getElementById('out').textContent = R.join('\n');
})();
</script></body></html>
